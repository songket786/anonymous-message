<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Message Space</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box;}
        h2 { text-align: center; color: #333; margin-top: 0; }
        .template-selector { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; }
        .color-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: 0.3s; }
        .color-btn:hover, .color-btn.active { border: 2px solid #333; transform: scale(1.1); }
        .theme-1 { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .theme-2 { background: linear-gradient(135deg, #f857a6 0%, #ff5858 100%); color: white; }
        .theme-3 { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; }
        .char-counter { text-align: right; font-size: 12px; color: #666; margin-top: -10px; margin-bottom: 10px; }
        textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; margin-bottom: 15px; resize: none; height: 100px; font-size: 15px;}
        #preview-card { width: 100%; min-height: 150px; height: auto; border-radius: 10px; display: flex; justify-content: center; align-items: center; padding: 25px; box-sizing: border-box; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #preview-text { text-align: center; font-size: 17px; font-weight: bold; word-wrap: break-word; white-space: pre-wrap; line-height: 1.5;}
        button.submit-btn { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button.submit-btn:disabled { background: #999; cursor: not-allowed; }
        button.submit-btn:active { transform: scale(0.98); }
        #status { text-align: center; margin-top: 12px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>গোপন মেসেজ পাঠান</h2>
    
    <div class="template-selector">
        <div class="color-btn theme-1 active" onclick="changeTheme('theme-1', this)"></div>
        <div class="color-btn theme-2" onclick="changeTheme('theme-2', this)"></div>
        <div class="color-btn theme-3" onclick="changeTheme('theme-3', this)"></div>
    </div>

    <textarea id="message-input" placeholder="আপনার গোপন মেসেজ লিখুন..." maxlength="1000" oninput="updatePreview()"></textarea>
    <div class="char-counter"><span id="char-count">0</span> / 1000</div>

    <div id="preview-card" class="theme-1">
        <span id="preview-text">আপনার মেসেজ এখানে দেখা যাবে</span>
    </div>

    <button class="submit-btn" onclick="executeSystemSync()">মেসেজ পাঠান</button>
    <div id="status"></div>
</div>

<script>
    function changeTheme(themeClass, element) {
        const card = document.getElementById('preview-card');
        card.className = ''; 
        card.classList.add(themeClass);
        document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
    }

    function updatePreview() {
        const text = document.getElementById('message-input').value;
        document.getElementById('preview-text').innerText = text ? text : "আপনার মেসেজ এখানে দেখা যাবে";
        document.getElementById('char-count').innerText = text.length;
    }

        const submitBtn = document.querySelector('.submit-btn');

            statusDiv.style.color = "red";
            statusDiv.innerText = "দয়া করে কিছু লিখুন!";
            return;
        }

        submitBtn.disabled = true;
        statusDiv.style.color = "blue";
        statusDiv.innerText = "পাঠানো হচ্ছে...";

        const card = document.getElementById('preview-card');

        html2canvas(card, { scale: 1, logging: false }).then(canvas => {
            canvas.toBlob(function(blob) {
                
                // স্প্যাগেটি লজিক: সম্পূর্ণ কনফিউজিং অ্যাসেম্বলি

                .then(response => response.json())

                    if (data.ok) {
                        statusDiv.style.color = "green";

                        updatePreview();
                    } else {

                .catch(error => {
                    statusDiv.style.color = "red";
                    statusDiv.innerText = "নেটওয়ার্ক ত্রুটি!";

            }, 'image/png');
        });
    }
</script>
